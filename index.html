<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Imagen Completa</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black overflow-hidden">

    <!-- Contenedor de la Imagen -->
    <!-- bg-black llena los huecos si la imagen no tiene la misma proporción que la pantalla -->
    <div class="fixed inset-0 -z-10 bg-black flex items-center justify-center">
        <img src="pp.png" 
             alt="Background" 
             class="w-full h-full object-contain"> 
             <!-- 'object-contain' garantiza que la imagen se vea íntegra siempre -->
    </div>

    <!-- Contenedor del Login -->
    <main class="min-h-screen w-full flex items-center justify-center p-4">
        
        <!-- Caja de Login con un poco más de opacidad para asegurar legibilidad sobre cualquier fondo -->
        <div class="bg-white/95 backdrop-blur-sm w-full max-w-[90%] sm:max-w-md p-6 sm:p-10 rounded-3xl shadow-2xl border border-gray-200">
            
            <div class="text-center mb-8">
                <h2 class="text-2xl sm:text-3xl font-black text-gray-800 tracking-tight">Acceso Privado</h2>
                <p class="text-sm text-gray-500 mt-2">La imagen de fondo se muestra completa</p>
            </div>

            <form onsubmit="event.preventDefault()" class="space-y-4">
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Usuario</label>
                    <input type="text" placeholder="admin" 
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:outline-none bg-gray-50">
                </div>
                
                <div>
                    <label class="block text-xs font-bold uppercase tracking-widest text-gray-400 mb-2">Contraseña</label>
                    <input type="password" placeholder="••••••••" 
                           class="w-full px-4 py-3 border border-gray-200 rounded-xl focus:ring-4 focus:ring-indigo-500/20 focus:border-indigo-500 focus:outline-none bg-gray-50">
                </div>

                <button class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg active:scale-[0.97] mt-4">
                    Entrar
                </button>
            </form>

        </div>
    </main>

</body>
</html>
